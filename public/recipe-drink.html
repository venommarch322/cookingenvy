<body>
  <h1>Fresh Lemon Mint Cooler</h1>
  <img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=1200&auto=format&fit=crop" alt="Fresh lemon mint cooler drink recipe" loading="eager" />
  <div class="box">
    <h2>Ingredients</h2>
    <ul>
      <li>2 lemons</li>
      <li>6 mint leaves</li>
      <li>2 cups cold water</li>
      <li>1 tablespoon honey</li>
      <li>Ice cubes</li>
    </ul>
  </div>
  <div class="box">
    <h2>Instructions</h2>
    <ol>
      <li>Squeeze the lemons into a jug.</li>
      <li>Add mint, honey, and cold water.</li>
      <li>Stir well and add ice.</li>
      <li>Serve chilled.</li>
    </ol>
  </div>
